AWSTemplateFormatVersion: "2010-09-09"
Description: "Windows EC2 instance with RDP access and local administrator user jasmine"

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable RDP/administrative access

  JasminePassword:
    NoEcho: true
    Type: String
    Description: Password for the local jasmine account
    MinLength: 8
    MaxLength: 32
    AllowedPattern: "[A-Za-z0-9@!#$%^&*()_+=-]+"
    ConstraintDescription: "Must be 8-32 characters and contain only alphanumeric or special characters."

Resources:
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs '' ]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC

  Route:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  RDPSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow RDP access
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 3389
        ToPort: 3389
        CidrIp: 0.0.0.0/0

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
      - !Ref RDPSecurityGroup
      ImageId: ami-0b2f6494ff0b07a0e # Windows Server 2019 Base (update per region)
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          # Create local user 'jasmine' with password from parameter
          $Password = ConvertTo-SecureString "${JasminePassword}" -AsPlainText -Force
          New-LocalUser -Name "jasmine" -Password $Password -FullName "Jasmine User" -Description "Local RDP user"
          # Add user to Remote Desktop Users group
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "jasmine"
          # Add user to Administrators group
          Add-LocalGroupMember -Group "Administrators" -Member "jasmine"
          </powershell>

Outputs:
  InstancePublicDNS:
    Description: Public DNS of the Windows EC2 instance
    Value: !GetAtt WindowsInstance.PublicDnsName
